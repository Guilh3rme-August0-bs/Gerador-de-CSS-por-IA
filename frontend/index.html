<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css" class="rel">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="shortcut icon" href="frontend\src\assets\icon-preview.png" type="image/png">

    <title>AI CSS Generator</title>
</head>

<body>

    <h1>Gerador de CSS <span>por IA</span></h1>

    <p>Digite um prompt para criar o elemento CSS que você deseja</p>

    <textarea rows="3" placeholder="Digite aqui" id="prompt-box"></textarea>
    <button id="botao">Gerar CSS</button> <i id="spinner" class="fa-solid fa-spinner"></i>

    <div class="boxes">
        <fieldset>
            <legend>Código</legend>
            <pre class="bloco-codigo"></pre>
        </fieldset>


        <fieldset>
            <legend>Preview</legend>
            <iframe class="resultado-codigo" src="" frameborder="0">
            </iframe>
        </fieldset>

    </div>
    <div class="footer-menu">
        <div class="buttonDiv">
            <button class="fullScreen" onclick="criarModal()" style="display:none">
                <i class="fa-solid fa-maximize"></i></button>
        </div>
    </div>


    <script src="script.js"></script>

</body>

</html>
